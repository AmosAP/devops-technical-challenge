name: Minimal AWS Role Test

on:
  push:
    branches: [ "main" ]  # Ou a branch que você quer testar

permissions:
  id-token: write
  contents: read

jobs:
  test-aws-role:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}       # Ex: us-east-1
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}       # ARN completo da role a assumir
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via role
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: |
          echo "Checking assumed role identity..."
          aws sts get-caller-identity

      - name: Login to Amazon ECR (optional)
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push Docker image (optional)
        run: |
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/test-image:latest"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
